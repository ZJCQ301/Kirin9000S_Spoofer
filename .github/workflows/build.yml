name: Build Zygisk Module

on:
  push:
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Android NDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'ndk;27.0.12077973'

    - name: Build with CMake
      run: |
        mkdir -p build
        cmake -B build -S zygisk \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_HOME/ndk/27.0.12077973/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-24
        cmake --build build

    - name: Prepare module release
      run: |
        mkdir -p release/zygisk
        cp build/libkirin9000s_spoofer.so release/zygisk/arm64-v8a.so
        cp module.prop customize.sh release/
        chmod +x release/customize.sh
        cd release && zip -r ../Kirin9000S_Spoofer.zip . && cd ..

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Kirin9000S_Spoofer
        path: Kirin9000S_Spoofer.zip
