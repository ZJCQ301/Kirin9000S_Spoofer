name: Build Zygisk Module

on:
  push:
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r27c
        link-to-sdk: true

    - name: Build with CMake
      run: |
        mkdir -p build
        cmake -B build \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_HOME/ndk/${{ steps.setup-ndk.outputs.ndk-version }}/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-24
        cmake --build build

    - name: Prepare module release
      run: |
        mkdir -p release/zygisk
        cp build/libkirin9000s_spoofer.so release/zygisk/arm64-v8a.so
        cp module.prop customize.sh release/
        chmod +x release/customize.sh
        cd release && zip -r ../Kirin9000S_Spoofer.zip . && cd ..

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Kirin9000S_Spoofer
        path: Kirin9000S_Spoofer.zip
